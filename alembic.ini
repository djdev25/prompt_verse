# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate new migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path-list to be prepended to sys.path in env.py.
# This allows env.py to import the models/configuration packages.
prepend_syspath = .

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to associate with the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow empty/non-existent migrations to run
# version_locations =

# version table name
# version_table = alembic_version

# version table schema (if not default schema)
# version_table_schema =

# format used to print log output in console
# output_encoding = utf-8

# sqlalchemy.url is typically set in env.py dynamically
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/omniverse_db

[post_write_hooks]
# post_write_hooks defines scripts or commands to run after a new migration is generated.
# Example: formatting generated code using black/ruff
# hooks = ruff_format
# ruff_format.type = console_scripts
# ruff_format.entrypoint = ruff
# ruff_format.options = format REVISION_SCRIPT_FILE

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
